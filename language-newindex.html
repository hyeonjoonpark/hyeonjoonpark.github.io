<!doctype html>
<html lang="ko">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0,
         minimum-scale=1.0">
         <link rel="stylesheet" href="newIndexHtml.css">
    </head>
    <body>
        <div id="title">
            <h1>게시판</h1>
        </div>
        <br>

        <table class="sub_news" border="1" cellspacing="0" summary="게시판의 글제목 리스트">
            <caption>게시판 리스트</caption>
            <colgroup>
            <col>
            <col width="110">
            <col width="100">
            <col width="80">
            </colgroup>
            <thead>
            <tr>
            <th scope="col">제목</th>
            <th scope="col">글쓴이</th>
            <th scope="col">날짜</th>
            <th scope="col">조회수</th>
            </tr>
            </thead>
            <tbody>
            <tr>
            <td class="title">
            <a href="#">게시판 제목이 들어갑니다</a>
            <img width="13" height="12" class="pic" alt="첨부이미지" src="첨부파일 ic_pic.gif"> <a class="comment" href="#">[5]</a> <img width="10" height="9" class="new" alt="새글" src="첨부파일/ic_new.gif">
            </td>
            <td class="name">부산소마고</td>
            <td class="date">2022/07/11</td>
            <td class="hit">1410</td>
            </tr>
            <tr class="reply">
            <td class="title" style="padding-left:30px;">
            <a href="#">블로그 개편 답글</a>
            </td>
            <td class="name">부산소마고</td>
            <td class="date">2020/07/12</td>
            <td class="hit">1410</td>
            </tr>
            
            <!-- tr이 제목 1줄입니다 보일 list 갯수만큼 li반복합니다.-->
            </tbody>
            </table>

            <br>

        <button id="button" onclick="window.open('writing.html')">
            글쓰기
        </button>
    </body>
</html>
